name: macos conda-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      max-parallel: 5

    steps:
      - uses: actions/checkout@v4

      # Set up Miniconda and create/activate the environment
      - name: Setup Miniconda (conda)
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: xrd-sim-env
          python-version: 3.13
          channels: conda-forge
          channel-priority: strict
          auto-activate-base: false
          auto-update-conda: true
          use-mamba: false
          cache: true

      - name: Show conda info
        shell: bash -l {0}
        run: |
          conda info
          conda list
          python --version

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          # Ensure environment exists
          conda env list
          # Install dependencies
          conda install -y -n xrd-sim-env -c conda-forge xrd_simulator
          conda install -y -n xrd-sim-env -c conda-forge pip
          python -m pip install --upgrade pip

      - name: Lint with flake8
        shell: bash -l {0}
        run: |
          conda install -y -n xrd-sim-env -c conda-forge flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=xfab

      - name: Test with pytest
        shell: bash -l {0}
        run: |
          conda install -y -n xrd-sim-env -c conda-forge pytest
          pytest -v
